server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for speed
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache Next.js static chunks for 1 year (immutable)
    location ~* /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header ETag "";
        if_modified_since off;
    }

    # Cache public images for 30 days
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Cache fonts for 1 year
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Don't cache HTML (always check for latest)
    location ~ \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        # Senior Fix: Try the uri as is, then with .html, then as a directory index
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Custom 404 page (Next.js generates 404.html)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
